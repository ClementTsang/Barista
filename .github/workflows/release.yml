# Builds and releases a .dmg file.

name: Release Barista

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    uses: ./.github/workflows/build.yml
    with:
      save: true

  upload-release:
    name: upload-release
    runs-on: macos-14
    needs: [build-release]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Get app version and build number
        run: |
          APP_VERSION=$(xcrun agvtool mvers -terse1 | tail -n1)
          APP_BUILD=$(xcrun agvtool vers -terse | tail -n1)
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV
          echo "APP_BUILD=$APP_BUILD" >> $GITHUB_ENV

      - name: Get build artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          pattern: build_artifacts
          path: build_artifacts
          merge-multiple: true

      - name: Generate dmg
        run: |
          npm install --global create-dmg
          mkdir release
          create-dmg "build_artifacts/Barista.xcarchive/Products/Applications/Barista.app" "release" || true

      - name: Print out all release files
        run: |
          echo "Generated $(ls ./release | wc -l) files:"
          du -h -d 0 ./release/*

      - name: Create release and add release files
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191 # 2.0.8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: false
          tag_name: ${{ env.APP_VERSION }}-${{env.APP_BUILD}}
          draft: true
          fail_on_unmatched_files: true
          name: ${{ env.APP_VERSION }}-${{env.APP_BUILD}} Release
          body: |
            <!-- Write summary here -->

            ---

            ## Bug Fixes
              
            ## Features
              
            ## Changes

            ## Other

            ## Internal Changes
          files: |
            ./release/*
